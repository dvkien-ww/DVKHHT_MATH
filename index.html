<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DVK MATH - Thầy Dương Văn Kiên</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <style>
        :root { --primary: #1a73e8; --success: #34a853; --danger: #ea4335; --warning: #fbbc04; --bg: #f8f9fa; }
        * { box-sizing: border-box; }
        html, body { height: 100dvh; margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); }
        body { display: flex; flex-direction: column; }
        
        #app-header { background: white; padding: 12px 20px; border-bottom: 1px solid #dadce0; display: flex; justify-content: space-between; align-items: center; z-index: 4000; flex-shrink: 0; }
        #app-header h1 { margin: 0; color: var(--primary); font-size: 20px; font-weight: 800; }
        #app-header p { margin: 0; font-size: 10px; color: #5f6368; font-weight: bold; text-transform: uppercase; }

        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }

        #main-container { flex: 1; display: flex; overflow: hidden; position: relative; flex-direction: row; }
        #setup-screen { position: absolute; inset: 0; background: white; z-index: 2000; display: none; flex-direction: column; align-items: center; overflow-y: auto; padding: 30px 20px; }
        
        #sidebar { width: 280px; background: white; border-right: 1px solid #dadce0; padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
        #main-content { flex: 1; padding: 25px; overflow-y: auto; background: var(--bg); }
        .hidden { display: none !important; }

        .q-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        .q-circle { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #f1f3f4; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 14px; }
        .q-circle.active { border: 2px solid var(--primary); color: var(--primary); background: #e8f0fe; }
        .q-circle.done { background: var(--success); color: white; }

        #result-screen, #theory-screen { display: none; position: absolute; inset: 0; width: 100%; height: 100%; overflow-y: auto; background: var(--bg); padding: 30px 20px; z-index: 4500; }
        .result-card, .theory-card { max-width: 850px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .theory-content { line-height: 1.8; font-size: 15px; white-space: pre-wrap; margin: 20px 0; border-top: 1px solid #eee; padding-top: 15px; }
        
        .contact-info { margin-top: 30px; padding: 20px; border-top: 1px dashed #ccc; font-size: 12px; color: #666; text-align: center; }
        .btn { padding: 12px 24px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; text-align: center; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-theory { background: var(--warning); color: #000; margin-top: 10px; }
        .btn-finish { background: var(--danger); color: white; width: 100%; margin-top: auto; padding: 15px; }
        .input-style { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 15px; }

        @media (max-width: 768px) {
            #main-container { flex-direction: column; overflow-y: auto; height: auto; }
            #sidebar { width: 100%; order: 2; border-right: none; border-top: 1px solid #dadce0; height: auto; padding: 20px; overflow: visible; }
            #main-content { width: 100%; order: 1; padding: 15px; flex: none; overflow: visible; }
            .q-grid { grid-template-columns: repeat(6, 1fr); }
            #app-header h1 { font-size: 18px; }
        }
    </style>
</head>
<body>

<header id="app-header">
    <div><h1>DVK MATH</h1><p>THẦY DƯƠNG VĂN KIÊN</p></div>
    <div id="header-user" style="font-size: 12px; color: #5f6368; text-align: right;"></div>
</header>

<div id="auth-screen">
    <div class="auth-card">
        <h2 style="color: var(--primary); margin: 0;">DVK MATH</h2>
        <input type="text" id="user-name" class="input-style" placeholder="Họ và tên">
        <input type="text" id="user-class" class="input-style" placeholder="Lớp">
        <button class="btn btn-primary" style="width: 100%;" onclick="handleAuth()">VÀO ÔN TẬP</button>
    </div>
</div>

<div id="main-container">
    <div id="setup-screen">
        <h2 style="margin-bottom: 5px; color: var(--primary);">Chào <span id="hello-name">...</span>!</h2>
        <div style="width: 100%; max-width: 400px; text-align: center; display: flex; flex-direction: column; margin-top: 20px;">
            <select id="grade-sel" class="input-style" onchange="updateChapters()"><option value="">-- Chọn Khối --</option><option value="10">Lớp 10</option><option value="11">Lớp 11</option><option value="12">Lớp 12</option></select>
            <select id="chapter-sel" class="input-style"><option value="">-- Chọn Chương --</option></select>
            <select id="time-sel" class="input-style">
                <option value="45">Thời gian: 45 Phút</option>
                <option value="60">Thời gian: 60 Phút</option>
                <option value="90">Thời gian: 90 Phút</option>
            </select>
            
            <button class="btn btn-primary" style="padding: 15px;" onclick="startQuiz()">BẮT ĐẦU LÀM BÀI</button>
            <button class="btn btn-theory" style="padding: 15px;" onclick="showTheory()">📖 XEM LÝ THUYẾT CHƯƠNG</button>
            
            <div class="contact-info">Phản hồi qua Mail: <b>kiensupham@gmail.com</b> hoặc Zalo: <b>09786237631</b></div>
        </div>
    </div>

    <div id="theory-screen">
        <div class="theory-card">
            <h2 id="theory-title" style="color: var(--primary); text-align: center; margin: 0;"></h2>
            <div id="theory-content" class="theory-content"></div>
            <div style="text-align: center;">
                <button class="btn btn-primary" onclick="closeTheory()">ĐÃ HIỂU, QUAY LẠI</button>
            </div>
        </div>
    </div>

    <div id="sidebar" class="hidden">
        <div id="timer" style="font-size:24px; font-weight:800; color:var(--danger); text-align:center; margin-bottom:20px;">00:00</div>
        <div class="q-grid" id="q-grid"></div>
        <button class="btn btn-finish" onclick="confirmFinish()">NỘP BÀI</button>
    </div>

    <div id="main-content" class="hidden">
        <div class="question-paper" id="paper"></div>
        <div style="display: flex; justify-content: space-between; margin-top: 25px; padding-bottom: 20px;">
            <button class="btn" style="background: #e0e0e0;" onclick="move(-1)">Trước</button>
            <button class="btn btn-primary" onclick="move(1)">Tiếp theo</button>
        </div>
    </div>

    <div id="result-screen">
        <div class="result-card">
            <div style="text-align:center; margin-bottom:30px;">
                <h2 style="color: var(--primary); margin: 0;">KẾT QUẢ BÀI LÀM</h2>
                <div id="final-score" style="font-size: 48px; font-weight: 900; margin: 10px 0;">0.0</div>
                <p id="res-info" style="color: #666;"></p>
                <button class="btn btn-primary" onclick="location.reload()">LÀM ĐỀ MỚI</button>
            </div>
            <div id="result-details"></div>
            <div class="contact-info">Mail: <b>kiensupham@gmail.com</b> | Zalo: <b>09786237631</b></div>
        </div>
    </div>
</div>

<script>
    let allQuestions = [], allTheory = [], examSet = [], answers = [], currentIdx = 0, timer;
    const labels = ["A", "B", "C", "D"];
    let currentUser = JSON.parse(localStorage.getItem('dvk_user'));

    window.onload = () => { 
        if(currentUser) { document.getElementById('auth-screen').style.display='none'; showSetup(); } 
        // Tải cả 2 file dữ liệu
        Promise.all([
            fetch('questions.json').then(r => r.json()),
            fetch('theory.json').then(r => r.json()).catch(() => []) // Tránh lỗi nếu chưa có file theory
        ]).then(([qData, tData]) => { 
            allQuestions = qData; 
            allTheory = tData; 
        }); 
    };

    function handleAuth() { const name = document.getElementById('user-name').value; const cls = document.getElementById('user-class').value; if(!name || !cls) return alert("Điền đủ thông tin!"); currentUser = { name, class: cls }; localStorage.setItem('dvk_user', JSON.stringify(currentUser)); document.getElementById('auth-screen').style.display = 'none'; showSetup(); }
    function showSetup() { document.getElementById('setup-screen').style.display = 'flex'; document.getElementById('hello-name').innerText = "Chào " + currentUser.name; document.getElementById('header-user').innerHTML = `<b>${currentUser.name}</b><br>${currentUser.class}`; }
    
    function updateChapters() { 
        const grade = document.getElementById('grade-sel').value; 
        const sel = document.getElementById('chapter-sel'); 
        sel.innerHTML = '<option value="">-- Chọn Chương --</option>'; 
        const chapters = [...new Set(allQuestions.filter(q => q.grade == grade).map(q => q.chapter))]; 
        chapters.forEach(c => { if(c) sel.innerHTML += `<option value="${c}">${c}</option>`; }); 
    }

    // Logic hiển thị lý thuyết từ file theory.json
    function showTheory() {
        const grade = document.getElementById('grade-sel').value;
        const chapter = document.getElementById('chapter-sel').value;
        if(!chapter) return alert("Hãy chọn khối và chương để xem lý thuyết!");
        
        const theory = allTheory.find(t => t.grade == grade && t.chapter == chapter);
        const theoryDiv = document.getElementById('theory-content');
        document.getElementById('theory-title').innerText = "Lý thuyết: " + chapter;
        
        if(theory) {
            theoryDiv.innerHTML = theory.content.replace(/\\n/g, '\n');
        } else {
            theoryDiv.innerHTML = `<div style="text-align:center; color:#888;">Nội dung lý thuyết chương này đang được thầy cập nhật...</div>`;
        }
        
        document.getElementById('theory-screen').style.display = 'block';
        if(window.renderMathInElement) renderMathInElement(theoryDiv, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}] });
    }
    
    function closeTheory() { document.getElementById('theory-screen').style.display = 'none'; }

    function startQuiz() {
        const chapter = document.getElementById('chapter-sel').value;
        const grade = document.getElementById('grade-sel').value;
        const selectedMinutes = parseInt(document.getElementById('time-sel').value);
        if(!chapter) return alert("Chọn chương!");
        const pool = allQuestions.filter(q => q.grade == grade && q.chapter == chapter);
        
        let cfg = (selectedMinutes == 45) ? { tn: 8, ds: 2, tln: 4 } : (selectedMinutes == 60) ? { tn: 12, ds: 4, tln: 6 } : { tn: 16, ds: 8, tln: 6 };
        const shuffle = (arr) => arr.sort(() => 0.5 - Math.random());
        examSet = [...shuffle(pool.filter(q => q.type === 'TN')).slice(0, cfg.tn), ...shuffle(pool.filter(q => q.type === 'DS')).slice(0, cfg.ds), ...shuffle(pool.filter(q => q.type === 'TLN')).slice(0, cfg.tln)];
        if(examSet.length === 0) return alert("Dữ liệu chương này đang cập nhật!");

        answers = new Array(examSet.length).fill(null);
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('sidebar').classList.remove('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        initTimer(selectedMinutes * 60);
        showQuestion();
    }

    function showQuestion() {
        const q = examSet[currentIdx], paper = document.getElementById('paper');
        let html = `<div style="font-size:1.1rem; margin-bottom:20px;"><b>Câu ${currentIdx + 1} (${q.type}):</b> ${q.q}</div>`;
        if(q.type === 'TN') {
            html += q.choices.map((c, i) => `<div class="option-item" onclick="saveTN(${i})"><input type="radio" ${answers[currentIdx]===i?'checked':''}> ${c}</div>`).join('');
        } else if(q.type === 'DS') {
            html += `<table style="width:100%;">` + Object.keys(q.items).map(k => `<tr><td style="padding:10px 0;"><b>${k}.</b> ${q.items[k]}</td><td align="right"><button class="btn" onclick="saveDS('${k}',true)" style="background:${answers[currentIdx]?.[k]===true?'var(--success)':'#eee'}">Đ</button> <button class="btn" onclick="saveDS('${k}',false)" style="background:${answers[currentIdx]?.[k]===false?'var(--danger)':'#eee'}">S</button></td></tr>`).join('') + `</table>`;
        } else if(q.type === 'TLN') {
            html += `<input type="text" class="input-style" placeholder="Nhập đáp án..." value="${answers[currentIdx]||''}" oninput="saveTLN(this.value)">`;
        }
        paper.innerHTML = html; renderSidebar();
        if(window.renderMathInElement) renderMathInElement(paper, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}] });
    }

    function saveTN(i) { answers[currentIdx] = i; showQuestion(); }
    function saveDS(k, v) { if(!answers[currentIdx]) answers[currentIdx]={}; answers[currentIdx][k]=v; showQuestion(); }
    function saveTLN(v) { answers[currentIdx] = v; renderSidebar(); }
    function move(s) { currentIdx = Math.max(0, Math.min(examSet.length - 1, currentIdx + s)); showQuestion(); window.scrollTo(0,0); }

    function renderSidebar() {
        document.getElementById('q-grid').innerHTML = examSet.map((_, i) => `<div class="q-circle ${i===currentIdx?'active':''} ${answers[i]!==null?'done':''}" onclick="currentIdx=${i};showQuestion()">${i+1}</div>`).join('');
    }

    function initTimer(sec) { timer = setInterval(() => { sec--; let m = Math.floor(sec/60), s = sec%60; document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`; if(sec<=0) confirmFinish(); }, 1000); }

    function confirmFinish() {
        if(!confirm("Bạn muốn nộp bài?")) return;
        clearInterval(timer);
        let score = 0, totalScore = 0; const container = document.getElementById('result-details'); container.innerHTML = "";
        examSet.forEach((q, i) => {
            let qScore = 0, maxQ = (q.type==='TN')?0.25 : (q.type==='DS')?1.0 : 0.5;
            if(q.type==='TN' && answers[i]===q.correct) qScore = 0.25;
            else if(q.type==='TLN' && String(answers[i]).trim()===String(q.correct)) qScore = 0.5;
            else if(q.type==='DS') { let cnt = 0; ["a","b","c","d"].forEach(k => { if(answers[i]?.[k]===q.correct[k]) cnt++; }); qScore = (cnt===4)?1:(cnt===3)?0.5:(cnt===2)?0.25:0; }
            score += qScore; totalScore += maxQ;
            
            let userAnsStr = q.type === 'DS' ? Object.keys(q.items).map(k => {
                let u = answers[i]?.[k];
                let color = (u === q.correct[k]) ? "green" : "red";
                return `<b>${k}:</b> ${q.items[k]} <b style="color:${color}">(${(u===true?'Đ':u===false?'S':'_')})</b>`;
            }).join('<br>') : (answers[i]||'Trống');
            
            container.innerHTML += `
                <div class="res-item">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><b>Câu ${i+1} (${q.type})</b> <b style="color:${qScore>0?'green':'red'}">${qScore.toFixed(2)}đ</b></div>
                    <div style="margin-bottom:10px">${q.q}</div>
                    <div class="res-box" style="background:#f8f9fa"><b>Bạn chọn:</b><br>${userAnsStr}</div>
                    <div class="res-box" style="background:#e6fffa"><b>Đáp án đúng:</b> ${q.type==='DS'?Object.entries(q.correct).map(([k,v])=>`${k}:${v?'Đ':'S'}`).join(', '):(q.type==='TN'?labels[q.correct]:q.correct)}</div>
                    <div class="explain-box"><b>Giải thích:</b> ${q.explain.replace(/\\n/g, '\n')}</div>
                </div>`;
        });
        document.getElementById('sidebar').classList.add('hidden');
        document.getElementById('main-content').classList.add('hidden');
        document.getElementById('result-screen').style.display='block';
        document.getElementById('final-score').innerText = score.toFixed(2) + " / " + totalScore.toFixed(2);
        if(window.renderMathInElement) renderMathInElement(container, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}] });
    }
</script>
</body>
</html>
