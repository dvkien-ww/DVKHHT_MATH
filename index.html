<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DVK MATH</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

<style>
/* GIỮ NGUYÊN STYLE CỦA BẠN */
:root { --primary:#1a73e8; --success:#34a853; --danger:#ea4335; --warning:#fbbc04; --bg:#f8f9fa;}
body{margin:0;font-family:Segoe UI;background:var(--bg)}
.hidden{display:none}
</style>

</head>

<body>

<!-- GIỮ NGUYÊN HTML CỦA BẠN -->

<div id="app"></div>

<script>

// ================== GIỮ NGUYÊN BIẾN ==================
let allQuestions = [], examSet = [], answers = [], currentIdx = 0, timer;
let remainingTime = 0;

// ================== LOAD + AUTO RESUME ==================
window.onload = () => {

    const saved = JSON.parse(localStorage.getItem('dvk_current_exam'));

    if(saved){
        if(confirm("Bạn có bài chưa làm xong. Tiếp tục?")){
            examSet = saved.examSet;
            answers = saved.answers;
            currentIdx = saved.currentIdx;

            remainingTime = saved.remainingTime;

            document.getElementById('auth-screen')?.style && (document.getElementById('auth-screen').style.display='none');
            document.getElementById('setup-screen')?.style && (document.getElementById('setup-screen').style.display='none');
            document.getElementById('sidebar')?.classList.remove('hidden');
            document.getElementById('main-content')?.classList.remove('hidden');

            initTimer(remainingTime);
            showQuestion();
            return;
        } else {
            localStorage.removeItem('dvk_current_exam');
        }
    }

    fetch('questions.json')
        .then(r => r.json())
        .then(data => { allQuestions = data; });
};

// ================== START QUIZ (NÂNG CẤP RANDOM LEVEL) ==================
function startQuiz() {

    const pool = allQuestions;

    let cfg = { tn:8, ds:2, tln:4 };

    const shuffle = arr => arr.sort(()=>0.5 - Math.random());

    const pickByLevel = (type, count) => {
        const easy = pool.filter(q => q.type===type && q.level==='easy');
        const medium = pool.filter(q => q.type===type && q.level==='medium');
        const hard = pool.filter(q => q.type===type && q.level==='hard');

        return [
            ...shuffle(easy).slice(0, Math.ceil(count*0.3)),
            ...shuffle(medium).slice(0, Math.ceil(count*0.5)),
            ...shuffle(hard).slice(0, Math.ceil(count*0.2))
        ].slice(0,count);
    };

    examSet = [
        ...pickByLevel('TN', cfg.tn),
        ...pickByLevel('DS', cfg.ds),
        ...pickByLevel('TLN', cfg.tln)
    ];

    // fallback nếu thiếu dữ liệu
    if(examSet.length === 0){
        examSet = shuffle(pool).slice(0, cfg.tn + cfg.ds + cfg.tln);
    }

    answers = new Array(examSet.length).fill(null);
    currentIdx = 0;

    initTimer(45*60);
    showQuestion();
}

// ================== TIMER + AUTO SAVE ==================
function initTimer(sec) {
    remainingTime = sec;

    timer = setInterval(() => {
        remainingTime--;

        let m = Math.floor(remainingTime/60),
            s = remainingTime%60;

        const timerEl = document.getElementById('timer');
        if(timerEl){
            timerEl.innerText = `${m}:${s<10?'0'+s:s}`;
        }

        // AUTO SAVE
        localStorage.setItem('dvk_current_exam', JSON.stringify({
            examSet,
            answers,
            currentIdx,
            remainingTime
        }));

        if(remainingTime <= 0) confirmFinish();
    }, 1000);
}

// ================== RETRY WRONG ==================
function retryWrong(){

    const newExam = [];
    const newAnswers = [];

    examSet.forEach((q,i)=>{
        let correct = false;

        if(q.type==='TN'){
            correct = answers[i] === q.correct;
        }
        else if(q.type==='TLN'){
            correct = String(answers[i]).trim() === String(q.correct);
        }
        else if(q.type==='DS'){
            let cnt = 0;
            ["a","b","c","d"].forEach(k=>{
                if(answers[i]?.[k] === q.correct[k]) cnt++;
            });
            correct = (cnt === 4);
        }

        if(!correct){
            newExam.push(q);
            newAnswers.push(null);
        }
    });

    if(newExam.length === 0){
        alert("Bạn đúng hết!");
        return;
    }

    examSet = newExam;
    answers = newAnswers;
    currentIdx = 0;

    document.getElementById('result-screen')?.style && (document.getElementById('result-screen').style.display='none');
    document.getElementById('sidebar')?.classList.remove('hidden');
    document.getElementById('main-content')?.classList.remove('hidden');

    initTimer(newExam.length * 60);
    showQuestion();
}

// ================== XÓA SAVE KHI NỘP ==================
function confirmFinish() {
    clearInterval(timer);

    localStorage.removeItem('dvk_current_exam');

    alert("Đã nộp bài!");
}

</script>

</body>
</html>
