<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DVK MATH - Thầy Dương Văn Kiên</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

<style>
:root { --primary:#1a73e8; --success:#34a853; --danger:#ea4335; --warning:#fbbc04; --bg:#f8f9fa;}
body{margin:0;font-family:Segoe UI;background:var(--bg)}
#app-header{background:#fff;padding:10px 20px;display:flex;justify-content:space-between}
#sidebar{width:260px;background:#fff;padding:15px;overflow-y:auto}
#main{flex:1;padding:20px}
.hidden{display:none}
.q-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.q-circle{background:#eee;padding:10px;text-align:center;border-radius:8px;cursor:pointer}
.q-circle.done{background:var(--success);color:#fff}
.option{border:1px solid #ddd;padding:10px;margin:5px 0;cursor:pointer}
</style>

</head>

<body>

<div id="auth">
<input id="name" placeholder="Tên">
<input id="cls" placeholder="Lớp">
<button onclick="login()">Vào</button>
</div>

<div id="setup" class="hidden">
<select id="grade">
<option value="10">10</option>
<option value="11">11</option>
<option value="12">12</option>
</select>
<select id="chapter"></select>
<select id="time">
<option value="45">45p</option>
<option value="60">60p</option>
</select>
<button onclick="start()">Bắt đầu</button>
</div>

<div style="display:flex;height:100vh">
<div id="sidebar" class="hidden">
<div id="timer"></div>
<div id="grid"></div>
<button onclick="finish()">Nộp</button>
</div>

<div id="main" class="hidden">
<div id="q"></div>
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
</div>
</div>

<div id="result" class="hidden"></div>

<script>

let all=[], exam=[], ans=[], idx=0, timer, remain=0;

// LOAD DATA + AUTO LOAD BÀI
window.onload=()=>{
fetch('questions.json').then(r=>r.json()).then(d=>all=d);

let saved=JSON.parse(localStorage.getItem('dvk_current_exam'));
if(saved && confirm("Tiếp tục bài cũ?")){
exam=saved.exam;
ans=saved.ans;
idx=saved.idx;
remain=saved.remain;
startUI();
startTimer(remain);
show();
}
};

// LOGIN
function login(){
document.getElementById('auth').classList.add('hidden');
document.getElementById('setup').classList.remove('hidden');
}

// START QUIZ
function start(){

let pool=all;

let cfg={tn:8,ds:2,tln:4};

function pick(type,n){
let easy=pool.filter(q=>q.type==type && q.level=='easy');
let med=pool.filter(q=>q.type==type && q.level=='medium');
let hard=pool.filter(q=>q.type==type && q.level=='hard');

let sh=a=>a.sort(()=>Math.random()-0.5);

return [...sh(easy).slice(0,n*0.3),
...sh(med).slice(0,n*0.5),
...sh(hard).slice(0,n*0.2)].slice(0,n);
}

exam=[...pick('TN',cfg.tn),...pick('DS',cfg.ds),...pick('TLN',cfg.tln)];

if(exam.length==0) exam=pool.sort(()=>Math.random()-0.5).slice(0,10);

ans=new Array(exam.length).fill(null);
idx=0;

startUI();
startTimer(60*45);
show();
}

// UI
function startUI(){
document.getElementById('setup').classList.add('hidden');
document.getElementById('sidebar').classList.remove('hidden');
document.getElementById('main').classList.remove('hidden');
}

// TIMER + AUTOSAVE
function startTimer(s){
remain=s;
timer=setInterval(()=>{
remain--;
document.getElementById('timer').innerText=remain;

localStorage.setItem('dvk_current_exam',JSON.stringify({
exam,ans,idx,remain
}));

if(remain<=0) finish();
},1000);
}

// SHOW
function show(){
let q=exam[idx];
let html=q.q;

if(q.type=='TN'){
q.choices.forEach((c,i)=>{
html+=`<div class="option" onclick="ans[${idx}]=${i};show()">${c}</div>`;
});
}
else if(q.type=='TLN'){
html+=`<input value="${ans[idx]||''}" oninput="ans[${idx}]=this.value">`;
}

document.getElementById('q').innerHTML=html;

renderGrid();
}

// GRID
function renderGrid(){
document.getElementById('grid').innerHTML=
exam.map((_,i)=>`<div class="q-circle ${ans[i]!=null?'done':''}" onclick="idx=${i};show()">${i+1}</div>`).join('');
}

// NAV
function next(){idx=Math.min(idx+1,exam.length-1);show()}
function prev(){idx=Math.max(idx-1,0);show()}

// FINISH
function finish(){
clearInterval(timer);
localStorage.removeItem('dvk_current_exam');

let wrong=[];

exam.forEach((q,i)=>{
if(ans[i]!=q.correct) wrong.push(q);
});

let html=`<h2>Kết quả</h2>
<button onclick="retry()">Làm lại câu sai</button>`;

document.getElementById('result').innerHTML=html;
document.getElementById('sidebar').classList.add('hidden');
document.getElementById('main').classList.add('hidden');
document.getElementById('result').classList.remove('hidden');

window.wrongSet=wrong;
}

// RETRY
function retry(){
if(!window.wrongSet || window.wrongSet.length==0){
alert("Bạn đúng hết!");
return;
}

exam=window.wrongSet;
ans=new Array(exam.length).fill(null);
idx=0;

document.getElementById('result').classList.add('hidden');
startUI();
startTimer(exam.length*60);
show();
}

</script>

</body>
</html>
